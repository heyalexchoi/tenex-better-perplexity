services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace:cached
      - screenshots_data:/workspace/data/screenshots
      - codex-data:/root/.codex
      - claude-data:/root/.claude
    working_dir: /workspace
    ports:
      - "8000:8000"
      - "5173:5173"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    command: ./start.sh

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  screenshots_data:
  codex-data:
  claude-data:
